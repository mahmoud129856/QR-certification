<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competition Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 min-h-screen text-white overflow-x-hidden">
    
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-black/50 backdrop-blur-md border-b border-indigo-500/30 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent">
                <i class="fas fa-trophy mr-2"></i> Hackathon Live
            </h1>
            <div id="countdown" class="text-lg font-mono bg-black/30 px-4 py-2 rounded-full border border-yellow-400/50"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 space-y-8 pb-24">
        
        <!-- Leaderboard Section -->
        <section class="bg-black/20 backdrop-blur-md rounded-3xl p-8 border border-indigo-500/30 animate-fade-in">
            <h2 class="text-3xl md:text-4xl font-bold mb-8 text-center bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent">
                <i class="fas fa-crown mr-2"></i> Leaderboard
            </h2>
            <div id="leaderboard" class="space-y-4 max-h-96 overflow-y-auto">
                <!-- Dynamic content -->
            </div>
        </section>

        <!-- Charts Section -->
        <section class="bg-black/20 backdrop-blur-md rounded-3xl p-8 border border-indigo-500/30 animate-fade-in">
            <h2 class="text-3xl md:text-4xl font-bold mb-8 text-center bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                <i class="fas fa-chart-bar mr-2"></i> Score Distribution
            </h2>
            <div class="w-full h-80 md:h-96">
                <canvas id="scoreChart"></canvas>
            </div>
        </section>

        <!-- MVP Section -->
        <section class="bg-gradient-to-r from-emerald-500/20 to-teal-500/20 backdrop-blur-md rounded-3xl p-8 border border-emerald-500/40 animate-fade-in">
            <h2 class="text-3xl md:text-4xl font-bold mb-8 text-center">
                <i class="fas fa-user-astronaut mr-2 text-yellow-400"></i> MVP
            </h2>
            <div id="mvp-card" class="text-center animate-pulse">
                <!-- Dynamic content -->
            </div>
        </section>

        <!-- Teams Overview -->
        <section class="bg-black/20 backdrop-blur-md rounded-3xl p-8 border border-indigo-500/30 animate-fade-in">
            <h2 class="text-3xl md:text-4xl font-bold mb-12 text-center bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                <i class="fas fa-users mr-2"></i> Teams Overview
            </h2>
            <div id="teams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Dynamic content -->
            </div>
        </section>

    </main>

    <!-- News Ticker -->
    <div id="news-ticker" class="fixed bottom-0 left-0 right-0 bg-gradient-to-r from-gray-900 to-black border-t-2 border-yellow-500/50 z-40 h-16 flex items-center px-4 overflow-hidden">
        <div class="flex items-center space-x-8 animate-marquee whitespace-nowrap">
            <!-- Dynamic content -->
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة الأمان</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-indigo-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-black/50 backdrop-blur-xl rounded-3xl p-12 w-full max-w-md border border-white/20 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-2xl">
                <i class="fas fa-shield-alt text-3xl text-black"></i>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent mb-2">
                لوحة الأمان
            </h1>
            <p class="text-gray-400">أدخل كلمة السر للدخول</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-4 rounded-xl {{ 'bg-red-500/20 border-red-500/50 text-red-300' if category == 'error' else 'bg-green-500/20 border-green-500/50 text-green-300' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">كلمة السر</label>
                <input type="password" name="password" required 
                       class="w-full bg-gray-800/50 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-400/50 backdrop-blur-sm transition-all duration-200" 
                       placeholder="••••••••">
            </div>
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-bold py-4 px-8 rounded-2xl text-lg shadow-2xl hover:shadow-yellow-500/50 hover:scale-[1.02] transition-all duration-300 transform">
                دخول لوحة التحكم
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/10 text-center">
            <p class="text-xs text-gray-500">الا  <code class="bg-gray-800 px-2 py-1 rounded font-mono"> </code></p>
            <p class="text-xs text-gray-400 mt-1">غ </p>
        </div>
    </div>
</body>
</html>
